name: No-spend CI

"on":
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: no-spend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  no-spend:
    name: No-spend checks
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: "11.0.8"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm exec prettier --check .

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Validate public sample
        run: pnpm tsx src/cli.ts validate-cases examples/cases.public.jsonl

      - name: Check public sample manifest freshness
        run: |
          tmp_manifest="$(mktemp)"
          pnpm tsx src/cli.ts validate-cases examples/cases.public.jsonl \
            --manifest-out "$tmp_manifest" \
            --intended-use public_sample \
            --source-label examples/cases.public.jsonl \
            --public-category-labels \
            --public-case-ids
          node - "$tmp_manifest" examples/cases.public.manifest.json <<'NODE'
          const { readFileSync } = require("node:fs");
          const [generatedPath, checkedInPath] = process.argv.slice(2);
          const generated = JSON.parse(readFileSync(generatedPath, "utf8"));
          const checkedIn = JSON.parse(readFileSync(checkedInPath, "utf8"));
          if (JSON.stringify(generated) !== JSON.stringify(checkedIn)) {
            console.error("examples/cases.public.manifest.json is stale");
            process.exit(1);
          }
          NODE

      - name: Check source CLI help
        run: pnpm tsx src/cli.ts --help >/tmp/frugal-fusion-help.txt

      - name: Build
        run: pnpm build

      - name: Check built CLI help
        run: node dist/src/cli.js --help >/tmp/frugal-fusion-built-help.txt

      - name: Check package publication guard
        run: |
          node - <<'NODE'
          const manifest = require("./package.json");
          if (manifest.private !== true) {
            console.error('package.json must keep "private": true before publication is approved');
            process.exit(1);
          }
          if (Object.hasOwn(manifest, "license")) {
            console.error("Do not add a package license field before repository licensing is decided");
            process.exit(1);
          }
          NODE
          if find . -maxdepth 1 -iname 'LICENSE*' -print -quit | grep -q .; then
            echo "Do not add LICENSE* before repository licensing is decided" >&2
            exit 1
          fi

      - name: Check tracked tree stayed clean
        run: test -z "$(git status --short --untracked-files=no)"
