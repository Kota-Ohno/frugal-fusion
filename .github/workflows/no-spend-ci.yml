name: No-spend CI

"on":
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: no-spend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  no-spend:
    name: No-spend checks
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: "11.0.8"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit public release guards
        run: node scripts/public-release-audit.mjs

      - name: Scan public release secrets
        run: node scripts/public-secret-scan.mjs

      - name: Check formatting
        run: pnpm run format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Validate public sample
        run: pnpm tsx src/cli.ts validate-cases examples/cases.public.jsonl

      - name: Check source CLI help
        run: pnpm tsx src/cli.ts --help >/tmp/frugal-fusion-help.txt

      - name: Build
        run: pnpm build

      - name: Check built CLI help
        run: node dist/src/cli.js --help >/tmp/frugal-fusion-built-help.txt

      - name: Check tracked tree stayed clean
        run: test -z "$(git status --short --untracked-files=no)"
